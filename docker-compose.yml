version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - SARVAM_API_KEY=${SARVAM_API_KEY:-}
      - SARVAM_CHAT_MODEL=${SARVAM_CHAT_MODEL:-sarvam-m}
      - SARVAM_TRANSLATE_MODEL=${SARVAM_TRANSLATE_MODEL:-sarvam-translate:v1}
      - SARVAM_VISION_MODEL=${SARVAM_VISION_MODEL:-sarvam-vision}
      # Supabase PostgreSQL (direct connection)
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:7MGCdVgJjwRruuXT@db.omsukgvwlzmyprszgkuj.supabase.co:5432/postgres}
      # AWS — minimal (S3 + Redis only)
      - AWS_REGION=${AWS_REGION:-ap-south-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME:-agri-translate-images}
      - REDIS_URL=${REDIS_URL:-redis://localhost:6379/0}
      - CORS_ORIGINS=http://localhost:5173,http://localhost:4173
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend

